<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blocks World - Basic</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="topbar">

        <button onclick="goMenu()">Back</button>
      
        <div class="title" id="title">Blocks World</div>
      
        <div class="stats">
          <div>Moves: <span id="moves">0</span></div>
          <div>Time: <span id="time">0</span>s</div>
          <div>Status: <span id="status">Your turn</span></div>
        </div>

        <div class="actions">
          <button id="restartBtn">Restart</button>
          <!-- <button id="aiMoveBtn" style="display:none;">AI Move</button> -->
        </div>
    </header>

  <main class="layout">
    <section class="board">
      <h2>Current</h2>
      <div id="game" class="stacks"></div>
      <p class="hint">Click a top block to select, then click a target stack to move.</p>
    </section>

    <aside class="goal">
      <h2>Goal</h2>
      <div id="goal" class="stacks goalStacks"></div>
    </aside>
  </main>
  <!-- Win Modal -->
  <div id="winModal" class="modal hidden">
    <div class="modal-content win-modal">
      <h2>✅ Goal Reached!</h2>
      <p>Moves: <span id="winMoves">0</span></p>
      <p>Time: <span id="winTime">0</span>s</p>

      <div class="win-actions">
        <button id="restartBtn2">Again</button>
        <button id="menuBtn">Back</button>
      </div>
    </div>
  </div>
  <script>
    function goMenu() {
      window.location.href = "index.html";
    }
  </script>
  <script src="game.js"></script>
</body>
</html>
